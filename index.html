<!DOCTYPE html>
<html class="dark" lang="es">
    <head>
        <meta charset="utf-8"/>
        <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
        <link href="style.css" rel="stylesheet"/>
        <script src="script.js" type="module"></script>
        <title>Toyocars - Repuestos originales Toyota</title>
    </head>
    <body>
        <header class="navigation" id="navigation">
        </header>
        <main class="content">
            <aside class="filters">
                <h2>Filtros</h2>

                <h3>Categoria</h3>
                <ul>
                    <li><label><input type="checkbox" name="category" value="mangueras"> Mangueras</label></li>
                    <li><label><input type="checkbox" name="category" value="motor"> Motor</label></li>
                    <li><label><input type="checkbox" name="category" value="frenos"> Frenos</label></li>
                    <li><label><input type="checkbox" name="category" value="suspension"> Suspension</label></li>
                    <li><label><input type="checkbox" name="category" value="electrico"> Electrico</label></li>
                </ul>

                <h3>Modelos</h3>
                <ul>
                    <li><label><input type="checkbox" name="model" value="corolla"> Corolla</label></li>
                    <li><label><input type="checkbox" name="model" value="yaris"> Yaris</label></li>
                    <li><label><input type="checkbox" name="model" value="camry"> Camry</label></li>
                </ul>
            </aside>
            <section class="results">
                <h2>Resultados</h2>
                
            </section>
            <template id="product-card-template">
                <article class="product-card">
                    <a href="item.html" class="card-link">
                        <div class="product-image"></div>
                        <div class="product-info">
                            <h3 class="product-title"></h3>
                            <span class="category-tag"></span>
                            <data value="" class="part-number"></data>
                            <p class="description"></p>
                            <footer class="card-footer">
                                <span class="view-details">Ver detalle</span>
                            </footer>
                        </div>
                    </a>
                </article>
            </template>
        </main>
    </body>
</html>
